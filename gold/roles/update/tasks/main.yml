---
- name: Update package cache
  ansible.builtin.apt:
    update_cache: yes

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: dist

- name: Update NTP server
  ansible.builtin.lineinfile:
    path: /etc/systemd/timesyncd.conf
    regexp: '^#NTP='
    line: 'NTP={{ lab_ntp }}'
  notify: Restart systemd-timesyncd Service

- name: Install packages
  ansible.builtin.apt:
     pkg:
       - needrestart
       - apt-transport-https
       - ca-certificates
       - curl
       - gpg  

- name: Check if reboot is needed
  shell: needrestart -b
  register: needrestart_result
  changed_when: false

- name: Reboot system if needed
  reboot:
    msg: "Rebooting due to pending updates"
    connect_timeout: 5
    reboot_timeout: 600
    pre_reboot_delay: 0
    post_reboot_delay: 30
    test_command: whoami
  when: "needrestart_result.stdout | regex_search('NEEDRESTART-KSTA: [2-3]')"
